services:
  desafio.api:
    image: ${DOCKER_REGISTRY-}desafioapi
    container_name: Desafio.Api
    build:
      context: .
      dockerfile: Desafio.Api/Dockerfile
    depends_on:
      - db
    ports:
      - "8080:8080"
      - "8081:8081"

  db:
    image: postgres:latest
    container_name: Desafio.Db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desafiodb
    volumes:
      - .containers/database:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "5050:5050"
    depends_on:
      - db
     
   
